<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 🌻</title>

<style>
body {
    margin: 0;
    padding: 0;
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(#fff7cc, #ffe680);
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    color: #b8860b;
    animation: aparecer 2s ease-in-out;
}

.ramo {
    font-size: 60px;
    margin-top: 40px;
}

.girasol {
    display: inline-block;
    animation: flotar 3s infinite ease-in-out;
}

p {
    margin-top: 30px;
    font-size: 20px;
    animation: aparecer 3s ease-in-out;
}

@keyframes flotar {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

@keyframes aparecer {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<h1>Un detalle para ti 💛</h1>

<div class="ramo">
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<br>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<br>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
<span class="girasol">🌻</span>
</div>

<p>Espero que te guste 😊</p>

</body>
</html>
